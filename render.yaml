services:
  - type: web
    name: ids-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: ids-db
    databaseName: ids_db
    user: ids_user
    plan: free
