services:
  - type: web
    name: ids-app
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: DATABASE_URL
        fromDatabase:
          name: ids-db
          property: connectionString

databases:
  - name: ids-db
    databaseName: ids_db
    user: ids_user
    plan: free
