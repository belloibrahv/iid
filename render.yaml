services:
  - type: web
    name: ids-app
    runtime: python
    runtimeVersion: 3.11.9
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production

databases:
  - name: ids-db
    databaseName: ids_db
    user: ids_user
    plan: free
